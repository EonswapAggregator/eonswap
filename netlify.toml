[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Headers for API endpoints
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tokens/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Proxy CoinGecko API to avoid CORS
[[redirects]]
  from = "/api/coingecko/*"
  to = "https://api.coingecko.com/:splat"
  status = 200
  force = true
  headers = {X-Forwarded-Host = "eonswap.us"}
